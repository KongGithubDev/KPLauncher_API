<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg-main: #0c4a6e;
            --neon-blue: #22d3ee;
            --electric: #0ea5e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020617; }

        .background {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(8, 145, 178, 0.3) 0%, transparent 50%),
                linear-gradient(135deg, #082f49 0%, #020617 100%);
            z-index: -1;
        }

        .streak {
            position: absolute;
            width: 2px;
            height: 150px;
            background: linear-gradient(to bottom, transparent, var(--neon-blue), transparent);
            opacity: 0.5;
            filter: blur(1px);
            animation: moveStreak 8s infinite linear;
        }

        @keyframes moveStreak {
            0% { transform: translateY(-200px) translateX(0) rotate(45deg); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(110vh) translateX(200px) rotate(45deg); opacity: 0; }
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.2), transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: pulse 10s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0.6; }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: drop-shadow(0 0 5px var(--neon-blue));
            animation: twinkle 4s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div id="glow-container"></div>
    <div id="elements-container"></div>

    <script>
        const elements = document.getElementById('elements-container');
        const glows = document.getElementById('glow-container');

        for(let i=0; i<3; i++) {
            const g = document.createElement('div');
            g.className = 'glow';
            g.style.left = Math.random() * 100 + '%';
            g.style.top = Math.random() * 100 + '%';
            g.style.animationDelay = (i * -3) + 's';
            glows.appendChild(g);
        }

        for(let i=0; i<10; i++) {
            const s = document.createElement('div');
            s.className = 'streak';
            s.style.left = Math.random() * 120 - 10 + '%';
            s.style.animationDuration = (Math.random() * 4 + 4) + 's';
            s.style.animationDelay = (Math.random() * -10) + 's';
            elements.appendChild(s);
        }

        for(let i=0; i<40; i++) {
            const st = document.createElement('div');
            st.className = 'star';
            const size = Math.random() * 2 + 1;
            st.style.width = size + 'px';
            st.style.height = size + 'px';
            st.style.left = Math.random() * 100 + '%';
            st.style.top = Math.random() * 100 + '%';
            st.style.animationDelay = (Math.random() * -5) + 's';
            elements.appendChild(st);
        }
    </script>
</body>
</html>
