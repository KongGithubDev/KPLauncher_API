<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thai Summer Breeze</title>

<style>
:root{
  --sky1:#7dd3fc;
  --sky2:#38bdf8;
  --sky3:#0ea5e9;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  position:relative;
  background:
    radial-gradient(circle at 80% 20%, rgba(255,255,255,.25), transparent 20%),
    linear-gradient(180deg, #7dd3fc 0%, #38bdf8 40%, #0ea5e9 70%, #075985 100%);
  font-family:sans-serif;
}

.sun-glow{
  position:fixed;
  top:-5%;
  right:-2%;
  width:320px;
  height:320px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,240,180,.95) 0%,
    rgba(255,200,80,.45) 40%,
    rgba(255,180,50,.15) 65%,
    transparent 75%);
  filter:blur(14px);
  opacity:.9;
}

.wave-wrap{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.wave{
  position:absolute;
  left:-10%;
  width:120%;
  border-radius:45%;
  filter:blur(10px);
}
.wave1{
  bottom:-8%;
  height:23%;
  background:radial-gradient(ellipse at center, rgba(255,255,255,.25), transparent 70%);
  opacity:.4;
  animation:waveMove1 10s ease-in-out infinite;
}
.wave2{
  bottom:-10%;
  height:20%;
  background:radial-gradient(ellipse at center, rgba(56,189,248,.20), transparent 70%);
  opacity:.25;
  animation:waveMove2 14s ease-in-out infinite;
}

@keyframes waveMove1{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(3%) translateY(-6px)}
}
@keyframes waveMove2{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(-3%) translateY(-10px)}
}

.heat-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.heat-particle{
  position:absolute;
  width:3px;
  height:3px;
  background:rgba(255,255,255,.5);
  border-radius:50%;
  opacity:0;
  animation:heatFloat linear infinite;
}
@keyframes heatFloat{
  0%{
    transform:translateY(0) scale(.8);
    opacity:0;
  }
  20%{opacity:.5}
  100%{
    transform:translateY(-120vh) scale(1.2);
    opacity:0;
  }
}

.shine{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(115deg,
      transparent 0%,
      rgba(255,255,255,.04) 45%,
      rgba(255,255,255,.10) 50%,
      transparent 55%);
  transform:translateX(-100%);
  animation:shineMove 12s linear infinite;
  mix-blend-mode:screen;
}
@keyframes shineMove{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

.flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  animation:flashAnim 12s infinite;
}
@keyframes flashAnim{
  0%,92%,100%{opacity:0}
  93%{opacity:.15}
  94%{opacity:0}
  95%{opacity:.08}
  96%{opacity:0}
}
</style>
</head>

<body>

<div class="sun-glow"></div>

<div class="wave-wrap">
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
</div>

<div class="heat-layer" id="heat"></div>

<div class="shine"></div>
<div class="flash"></div>

<script>
const heat = document.getElementById("heat");

for(let i=0;i<40;i++){
  const h = document.createElement("div");
  h.className = "heat-particle";
  h.style.left = Math.random()*100 + "%";
  h.style.bottom = (-20 - Math.random()*40) + "px";
  h.style.animationDuration = (Math.random()*10 + 10) + "s";
  h.style.animationDelay = (Math.random()*-20) + "s";
  heat.appendChild(h);
}
</script>

</body>
</html>
